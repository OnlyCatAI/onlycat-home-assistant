name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compute new version
        id: version
        env:
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          current=$(jq -r '.version' custom_components/onlycat/manifest.json)
          IFS='.' read -r major minor patch <<< "$current"

          case "${BUMP_TYPE}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new_version="${major}.${minor}.${patch}"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          jq --arg v "${NEW_VERSION}" \
            '.version = $v' custom_components/onlycat/manifest.json > manifest_tmp.json
          mv manifest_tmp.json custom_components/onlycat/manifest.json

      - name: Extract changelog entry
        id: changelog
        run: |
          # Extract the topmost entry (between "# Changelog" and first "---")
          notes=$(awk '/^# Changelog/{found=1; next} /^---$/{exit} found{print}' CHANGELOG.md)
          # Trim leading/trailing blank lines
          notes=$(echo "$notes" | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba}')
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Delete draft releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName,isDraft --jq '.[] | select(.isDraft) | .tagName' | while read -r tag; do
            echo "Deleting draft release: $tag"
            gh release delete "$tag" --yes --cleanup-tag || true
          done

      - name: Commit and push
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/onlycat/manifest.json
          git commit -m "Release v${NEW_VERSION}"
          git push

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --notes "${RELEASE_NOTES}"
