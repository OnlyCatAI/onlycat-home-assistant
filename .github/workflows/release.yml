name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      changelog:
        description: "Release notes (Markdown)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compute new version
        id: version
        env:
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          current=$(jq -r '.version' custom_components/onlycat/manifest.json)
          IFS='.' read -r major minor patch <<< "$current"

          case "${BUMP_TYPE}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new_version="${major}.${minor}.${patch}"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          jq --arg v "${NEW_VERSION}" \
            '.version = $v' custom_components/onlycat/manifest.json > manifest_tmp.json
          mv manifest_tmp.json custom_components/onlycat/manifest.json

      - name: Update CHANGELOG.md
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          CHANGELOG_INPUT: ${{ inputs.changelog }}
        run: |
          new_version="${NEW_VERSION}"
          changelog="${CHANGELOG_INPUT}"

          entry="## v${new_version}"$'\n\n'"${changelog}"

          if [ -f CHANGELOG.md ]; then
            # Read existing content, skip the "# Changelog" heading if present
            existing=$(tail -n +2 CHANGELOG.md)
            {
              echo "# Changelog"
              echo ""
              echo "$entry"
              echo ""
              echo "---"
              echo "$existing"
            } > CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              echo "$entry"
            } > CHANGELOG.md
          fi

      - name: Commit and push
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/onlycat/manifest.json CHANGELOG.md
          git commit -m "Release v${NEW_VERSION}"
          git push

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          CHANGELOG_INPUT: ${{ inputs.changelog }}
        run: |
          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --notes "${CHANGELOG_INPUT}"
