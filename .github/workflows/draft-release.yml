name: Draft Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  draft-release:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compute draft version
        id: version
        run: |
          current=$(jq -r '.version' custom_components/onlycat/manifest.json)
          IFS='.' read -r major minor patch <<< "$current"
          next_patch=$((patch + 1))
          draft_version="${major}.${minor}.${next_patch}_draft-${{ github.event.pull_request.number }}"
          echo "draft_version=$draft_version" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          DRAFT_VERSION: ${{ steps.version.outputs.draft_version }}
        run: |
          gh release create "v${DRAFT_VERSION}" \
            --draft \
            --title "${PR_TITLE}" \
            --notes "${PR_BODY}"
