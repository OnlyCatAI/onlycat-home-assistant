name: Draft Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  draft-release:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Compute draft version
        id: version
        run: |
          current=$(jq -r '.version' custom_components/onlycat/manifest.json)
          IFS='.' read -r major minor patch <<< "$current"
          next_patch=$((patch + 1))
          draft_version="${major}.${minor}.${next_patch}_draft-$(date +%Y%m%d%H%M%S)"
          echo "draft_version=$draft_version" >> "$GITHUB_OUTPUT"
          echo "draft_title=$draft_title" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.head_commit.message }}
          DRAFT_VERSION: ${{ steps.version.outputs.draft_version }}
          PR_TITLE: ${{ steps.version.outputs.draft_version }}
        run: |
          gh release create "v${DRAFT_VERSION}" \
            --prerelease \
            --title "${PR_TITLE}" \
            --notes "${PR_BODY}"
